name: deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npx tsc -p tsconfig.json --noEmit

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      # type=gha reuses unchanged layers (worker's apt/gh/uv/claude-code, the npm
      # install) across runs. Separate scopes keep the two images' caches distinct.
      - name: Build and push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/claude-at/worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/gateway.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/claude-at/gateway:latest
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform apply
        working-directory: infra/terraform
        run: |
          ACCOUNT="$(aws sts get-caller-identity --query Account --output text)"
          terraform init -input=false -backend-config="bucket=claude-at-tfstate-${ACCOUNT}"
          terraform apply -auto-approve -input=false -var 'profile='

      - name: Roll services onto the new images
        run: |
          aws ecs update-service --cluster claude-at --service claude-at-gateway --force-new-deployment >/dev/null
          aws ecs update-service --cluster claude-at --service claude-at-worker --force-new-deployment >/dev/null
